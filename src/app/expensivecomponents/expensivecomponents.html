<mat-tree #tree [dataSource]="dataSource$ | async" [childrenAccessor]="childrenAccessor" style="display: flex; flex-direction: column; gap: 10px;">
  <!-- Leaf node template -->
  <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
    <!-- padding button -->
    <button mat-icon-button disabled></button>
    <!-- show the name from node.data -->
    <!-- <mat-card class="node-card" role="group" aria-label="{{ node.data?.name }} card" style="width: 50%">
      <div class="card-content">
        <img class="node-thumb" [src]="node?.data?.image" [alt]="node.data?.name + ' thumbnail'"
          style="height: 40px; width: 40px;" />

        <div class="card-text">
          <div class="card-title">{{ node.data?.name }}</div>
          <div class="card-meta">{{ node.data?.type }} • {{ node.data?.size }}</div>
        </div>
        <button mat-stroked-button color="primary"
          (click)="getImageDetails(node?.data?.image); $event.stopPropagation()"
          aria-label="Show image details for {{ node.data?.name }}">
          Image details
        </button>
      </div>
    </mat-card> -->
    <!-- optionally show size/type -->

    <mat-card class="example-card" appearance="outlined" style="display: flex; justify-content: center; align-items: center; width: 30%;">
      <mat-card-header>
        <div mat-card-avatar class="example-header-image"></div>
        <mat-card-title>{{ node?.data?.name }}</mat-card-title>
        <!-- <mat-card-subtitle>Dog Breed</mat-card-subtitle> -->
      </mat-card-header>
      <img mat-card-image [src]="`http://localhost:5250/uploads/${node?.data?.image}`" alt="Photo of a Shiba Inu" style="height: 200px; width: 250px; margin-top: -23px; object-fit: cover; border-radius: 25px;" />
      <!-- <mat-card-content style="display: flex; justify-content: center; align-items: center;">
        <p style="text-align: center; width: 70%;">
          {{ node?.data?.description }}
        </p>
      </mat-card-content> -->
      <mat-card-actions>
        <button matButton (click)="viewDetails(node?.data)">View Details</button>
      </mat-card-actions>
    </mat-card>


  </mat-tree-node>

  <!-- Expandable node template -->
  <mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding matTreeNodeToggle
    [cdkTreeNodeTypeaheadLabel]="node.data?.name">
    <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.data?.name">
      <mat-icon class="mat-icon-rtl-mirror">
        {{ tree.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
      </mat-icon>
    </button>
    {{ node.data?.name }}
    <small class="meta"> ({{ node.data?.size }} • {{ node.data?.type }})</small>
    <!-- <button (click)="getImageDetails(node?.data?.image)" style="padding: 10px; background-color: blue;">iamge details</button> -->
  </mat-tree-node>
</mat-tree>


<!-- tree table grid -->


<table mat-table [dataSource]="products" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="Code">
    <th mat-header-cell *matHeaderCellDef> Code </th>
    <td mat-cell *matCellDef="let element"> {{element.code}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="Name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="Category">
    <th mat-header-cell *matHeaderCellDef> Category </th>
    <td mat-cell *matCellDef="let element"> {{element.category}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="Quantity">
    <th mat-header-cell *matHeaderCellDef> Quantity </th>
    <td mat-cell *matCellDef="let element"> {{element.quantity}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
